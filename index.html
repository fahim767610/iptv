<head>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    
    <style>
        body,html{margin:0;padding:0;width:100%;height:100%;background-color:#050505;overflow:hidden;font-family:'Hind Siliguri','Inter',sans-serif;color:#fff}
        
        #vjs-wrapper, #fluid-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #fluid-wrapper { display: none; background: #000; z-index: 1; }
        #vjs-wrapper { z-index: 2; }
        
        .fluid_video_wrapper { width: 100% !important; height: 100% !important; }
        .video-js{width:100%!important;height:100%!important;background-color:transparent}
        
        /* Video.js & Fluid Player - Liquid Glass Control Bar styling */
        .video-js .vjs-control-bar, .fluid_controls_container {
            background: rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px !important;
            bottom: 30px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: calc(100% - 60px) !important;
            max-width: 850px !important;
            height: 56px !important;
            display: flex !important;
            align-items: center !important;
            padding: 0 15px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
            transition: opacity .4s ease, transform .4s ease;
        }
        /* Fluid player specfics to match layout */
        .fluid_controls_container { padding: 0 10px; display: block !important; }
        
        .video-js .vjs-button { width: 40px !important; height: 40px !important; display: flex !important; align-items: center !important; justify-content: center !important; border-radius: 50% !important; margin: 0 3px !important; transition: all .2s ease; background: 0 0 !important; }
        .video-js .vjs-button:hover { background: rgba(255, 255, 255, 0.15) !important; }
        .video-js .vjs-icon-placeholder:before { font-size: 1.5em !important; line-height: 1 !important; display: flex; align-items: center; justify-content: center; }
        
        .video-js .vjs-volume-panel { display: flex !important; align-items: center !important; width: auto !important; }
        .video-js .vjs-volume-panel .vjs-volume-control { display: flex !important; align-items: center !important; height: 100% !important; }
        .video-js .vjs-volume-level { background-color: #fff !important; }
        
        /* PiP & Quality Button Position styling */
        .video-js .vjs-picture-in-picture-control { display: flex !important; }
        .video-js .vjs-subs-caps-button { display: flex !important; } /* CC Button */
        .video-js .vjs-http-source-selector { display: flex !important; } /* Quality Button */
        
        .video-js .vjs-live-control, .video-js .vjs-live-display { display: none !important; }
        .vjs-current-time, .vjs-duration, .vjs-remaining-time, .vjs-time-divider { display: none !important; }
        
        /* SLEEK PROGRESS BAR - White Glass */
        .video-js .vjs-progress-control { display: flex !important; flex: auto; align-items: center; margin: 0 10px; }
        .video-js .vjs-progress-holder { height: 6px; border-radius: 4px; background: rgba(255,255,255,0.2); }
        .video-js .vjs-play-progress { background-color: rgba(255,255,255,0.9); border-radius: 4px; }
        .video-js .vjs-play-progress:before { font-size: 14px; top: -4px; color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .video-js .vjs-load-progress { background: rgba(255,255,255,0.1) !important; border-radius: 4px; }
        .video-js .vjs-load-progress div { background: rgba(255,255,255,0.15) !important; border-radius: 4px; }

        /* QUALITY MENU STYLING */
        .video-js .vjs-menu-button-popup .vjs-menu { z-index: 10000; bottom: 15px; margin-bottom: 10px; }
        .video-js .vjs-menu-content { 
            background: rgba(15, 15, 15, 0.85) !important; 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px !important; padding: 8px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .video-js .vjs-menu-item { border-radius: 8px; margin: 2px 0; transition: 0.2s; font-family: 'Hind Siliguri', sans-serif; font-weight: 600; text-transform: capitalize; }
        .video-js .vjs-menu-item:hover, .video-js .vjs-menu-item:focus { background: rgba(255,255,255,0.15) !important; }
        .video-js .vjs-menu-item.vjs-selected { background: rgba(255, 255, 255, 0.25) !important; color: #fff; }

        /* TOGGLE BUTTON STYLE */
        .server-toggle-btn {
            position: absolute; top: 20px; right: 20px; z-index: 10000;
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%;
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .server-toggle-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }

        /* VERTICAL RIGHT-ALIGNED SERVER BOX */
        .server-box {
            position: absolute; right: 20px; top: 80px; z-index: 9999; 
            display: flex; gap: 12px; flex-direction: column; align-items: stretch;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 20px 15px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 30px rgba(0,0,0,.3);
            max-height: calc(100vh - 180px); overflow-y: auto; overflow-x: hidden; width: 110px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1; visibility: visible;
        }
        .server-box.hidden { transform: translateX(150%); opacity: 0; visibility: hidden; }
        
        /* Custom Scrollbar for Server Box */
        .server-box::-webkit-scrollbar { width: 4px; }
        .server-box::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .server-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
        .server-box::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }
        
        /* --- AUTO HIDE LOGIC FOR CUSTOM UI --- */
        body.is-idle .server-toggle-btn,
        body.is-idle .server-box {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        :fullscreen .server-box, :-webkit-full-screen .server-box, 
        :fullscreen .server-toggle-btn, :-webkit-full-screen .server-toggle-btn { 
            display: none !important; 
        }

        .server-btn{background:0 0;color:#ccc;padding:10px 8px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;border:none;position:relative;width:100%;text-align:center;}
        .server-btn:hover{background:rgba(255,255,255,.1);color:#fff}
        
        /* Active Server Button - White Glass */
        .server-btn.active{background:rgba(255,255,255,0.2);color:#fff;box-shadow:0 4px 15px rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.4); font-weight:700}
        
        .badge-hd::after { content: 'HD'; position: absolute; top: -6px; right: -4px; background: #00d2ff; color: #000; font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .badge-4k::after { content: '4K'; position: absolute; top: -6px; right: -4px; background: #FFD700; color: #000; font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 8px; box-shadow: 0 2px 5px rgba(255,215,0,0.5); }

        /* ================= MOBILE RESPONSIVE TWEAKS ================= */
        @media (max-width:768px){
            .video-js .vjs-control-bar, .fluid_controls_container {width:96%!important;bottom:15px!important;height:48px!important;padding:0 5px!important}
            .video-js .vjs-button{width:30px!important;height:30px!important;margin:0 2px!important}
            .video-js .vjs-icon-placeholder:before{font-size:1.3em!important}
            .video-js .vjs-progress-control { margin: 0 4px !important; }
            
            .server-toggle-btn { top: 15px; right: 15px; width: 40px; height: 40px; }
            .server-box { 
                top: 70px; right: 15px; width: 95px; padding: 15px 10px;
                max-height: calc(100vh - 140px);
            }
            
            .video-js.vjs-has-started.vjs-user-inactive.vjs-playing .vjs-control-bar,
            .fluid_controls_container { opacity: 1 !important; visibility: visible !important; display: flex !important; transform: translateX(-50%) translateY(0) !important; }
        }
    </style>
</head>
<body>

<button id="serverToggleBtn" class="server-toggle-btn" onclick="toggleServerList()" aria-label="Toggle Server List">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">

</button>

<div class="server-box" id="serverBox">
    <button id="btn-0" class="server-btn badge-hd active" onclick="changeServer('https://prod-cdn01-live.toffeelive.com/live/FIFA-2026-3/sst/0/master_1500.m3u8?hdntl=Expires=1783041148~_GO=Generated~URLPrefix=aHR0cHM6Ly9wcm9kLWNkbjAxLWxpdmUudG9mZmVlbGl2ZS5jb20~Signature=AeQsclDmkNXkDTQQGXnCCjWd5QHkSDMbhqlxjQMXVAkRhhpmNcibqgqbrtrtkAj3Tw2XG3KAUkV2Id5Q4q-XNVHiooUF', 0)">

    <button id="btn-2" class="server-btn badge-hd " onclick="changeServer('https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8', 2)">

<div id="vjs-wrapper">
    <video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay muted playsinline preload="metadata">

<script defer src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<!-- HLS Quality Selector Plugins for Video.js -->
<script defer src="https://unpkg.com/videojs-contrib-quality-levels@2.1.1/dist/videojs-contrib-quality-levels.min.js"></script>
<script defer src="https://unpkg.com/videojs-http-source-selector@1.1.6/dist/videojs-http-source-selector.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script defer src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>

<script defer>
    // --- UI AUTO HIDE LOGIC ---
    let uiIdleTimer;
    function resetUIIdleTimer() {
        document.body.classList.remove('is-idle');
        clearTimeout(uiIdleTimer);
        uiIdleTimer = setTimeout(() => {
            document.body.classList.add('is-idle');
        }, 3500); // UI hides after 3.5 seconds of inactivity
    }
    // Attach listeners to detect user activity
    ['mousemove', 'mousedown', 'touchstart', 'click', 'keydown'].forEach(evt => {
        document.addEventListener(evt, resetUIIdleTimer, true);
    });
    resetUIIdleTimer(); // Initialize on load
    // --------------------------

    const nukePage=()=>{document.body.innerHTML='',document.body.style.backgroundColor='black',document.head.innerHTML=''};
    document.addEventListener('contextmenu',e=>e.preventDefault());
    document.addEventListener('keydown',e=>{if(123===e.keyCode||(e.ctrlKey&&e.shiftKey&&(73===e.keyCode||74===e.keyCode||67===e.keyCode))||(e.ctrlKey&&85===e.keyCode))e.preventDefault(),nukePage()});
    setInterval(()=>{const e=performance.now();debugger;performance.now()-e>100&&nukePage()},500);
    window.addEventListener('resize',()=>{const e=window.outerWidth-window.innerWidth,n=window.outerHeight-window.innerHeight;(e>160||n>160)&&nukePage()});
    const devtoolsDetector=new Image;Object.defineProperty(devtoolsDetector,'id',{get:function(){nukePage()}});console.log('%c',devtoolsDetector);

    function toggleServerList() {
        const serverBox = document.getElementById('serverBox');
        if (serverBox) serverBox.classList.toggle('hidden');
    }

    var hlsFluid = null;
    var fluidPlayerInstance = null;

    function initFluidPlayer(url) {
        if(!fluidPlayerInstance) {
            fluidPlayerInstance = fluidPlayer('fluid-player', {
                layoutControls: { 
                    fillToContainer: true, 
                    primaryColor: "#ffffff", 
                    autoPlay: true, 
                    mute: true, 
                    controlBar: { autoHide: true } 
                }
            });
        }
        var videoEl = document.getElementById('fluid-player');
        if (Hls.isSupported()) {
            if(hlsFluid) hlsFluid.destroy();
            hlsFluid = new Hls({maxBufferLength: 30});
            hlsFluid.loadSource(url);
            hlsFluid.attachMedia(videoEl);
            hlsFluid.on(Hls.Events.MANIFEST_PARSED, function() {
                videoEl.play().catch(e=>console.log(e));
            });
        } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
            videoEl.src = url;
            videoEl.play();
        }
    }

    window.addEventListener('load', function() {
        var serverList = [
            "https://prod-cdn01-live.toffeelive.com/live/FIFA-2026-3/sst/0/master_1500.m3u8?hdntl=Expires=1783041148~_GO=Generated~URLPrefix=aHR0cHM6Ly9wcm9kLWNkbjAxLWxpdmUudG9mZmVlbGl2ZS5jb20~Signature=AeQsclDmkNXkDTQQGXnCCjWd5QHkSDMbhqlxjQMXVAkRhhpmNcibqgqbrtrtkAj3Tw2XG3KAUkV2Id5Q4q-XNVHiooUF",
            "http://198.195.239.50:8095/tsports/index.m3u8",
            "https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8",
            "https://ncdn.telewebion.ir/faratar/live/playlist.m3u8"
        ];
        
        var currentServerIndex=0, isSwitching=!1;
        
        // ==========================================
        // Video.js Initialization with CC and PiP
        // ==========================================
        var player = videojs('live-player', {
            html5: { vhs: { overrideNative: !0, allowCrossfileNaming: !0 } },
            muted: !0,
            controlBar: {
                children: [
                    'playToggle',
                    'volumePanel',
                    'subsCapsButton', 
                    'pictureInPictureToggle', 
                    'progressControl',
                    'fullscreenToggle'
                ]
            }
        });
        
        player.ready(function(){
            player.muted(!0);
            
            // Initialize Quality Selector Plugin
            if (typeof player.httpSourceSelector === 'function') {
                player.httpSourceSelector();
            }

            player.play();
        });

        window.changeServer=function(e,n){
            if(0===n&&0!==currentServerIndex)return void window.location.reload();
            if(n === currentServerIndex) return;
            
            currentServerIndex=n, isSwitching=!1;
            document.querySelectorAll('.server-btn').forEach(btn=>btn.classList.remove('active'));
            var t=document.getElementById('btn-'+n);
            if(t) t.classList.add('active');

            if (n < 4) {
                document.getElementById('fluid-wrapper').style.display = 'none';
                document.getElementById('vjs-wrapper').style.display = 'block';
                var fplayer = document.getElementById('fluid-player');
                if(fplayer && fplayer.pause) fplayer.pause();
                
                player.error(null);
                player.pause();
                player.src({src:e,type:'application/x-mpegURL'});
                player.load();
                player.play().then(function(){isSwitching=!1}).catch(function(e){console.log("Autoplay failed:",e);setTimeout(function(){isSwitching=!1},2500)});
            } else {
                document.getElementById('vjs-wrapper').style.display = 'none';
                document.getElementById('fluid-wrapper').style.display = 'block';
                player.pause();
                
                initFluidPlayer(e);
                isSwitching = !1;
            }
        };

        player.on('error',function(){
            if(isSwitching)return;
            var e=currentServerIndex+1;
            e<serverList.length&&(isSwitching=!0,setTimeout(function(){changeServer(serverList[e],e)},3e3))
        });

        // ==========================================
        // Fullscreen Logic
        // ==========================================
        const srvBox = document.querySelector('.server-box');
        const srvToggle = document.querySelector('.server-toggle-btn');

        document.addEventListener('fullscreenchange', () => {
            if(document.fullscreenElement) {
                if (srvBox) srvBox.style.display = 'none';
                if (srvToggle) srvToggle.style.display = 'none';
            } else {
                if (srvBox) srvBox.style.display = 'flex';
                if (srvToggle) srvToggle.style.display = 'flex';
            }
        });
    });
</script>
