    <style>
        body,html{margin:0;padding:0;width:100%;height:100%;background-color:#050505;overflow:hidden;font-family:'Hind Siliguri','Inter',sans-serif;color:#fff}
        
        #vjs-wrapper, #fluid-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #fluid-wrapper { display: none; background: #000; z-index: 1; }
        #vjs-wrapper { z-index: 2; }
        
        .fluid_video_wrapper { width: 100% !important; height: 100% !important; }
        .video-js{width:100%!important;height:100%!important;background-color:transparent}
        
        /* Control Bar styling - Glassmorphic */
        .video-js .vjs-control-bar, .fluid_controls_container {
            background: rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px !important;
            bottom: 30px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: calc(100% - 60px) !important;
            max-width: 850px !important;
            height: 60px !important; 
            display: flex !important;
            align-items: center !important;
            padding: 0 15px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
            transition: opacity .4s ease, transform .4s ease;
        }
        .fluid_controls_container { padding: 0 10px; display: block !important; }
        
        .video-js .vjs-button { width: 46px !important; height: 46px !important; display: flex !important; align-items: center !important; justify-content: center !important; border-radius: 50% !important; margin: 0 4px !important; transition: all .2s ease; background: 0 0 !important; }
        .video-js .vjs-button:hover { background: rgba(255, 255, 255, 0.15) !important; }
        .video-js .vjs-icon-placeholder:before { font-size: 1.8em !important; line-height: 1 !important; display: flex; align-items: center; justify-content: center; }
        
        .video-js .vjs-volume-panel { display: flex !important; align-items: center !important; width: auto !important; }
        .video-js .vjs-volume-panel .vjs-volume-control { display: flex !important; align-items: center !important; height: 100% !important; }
        .video-js .vjs-volume-level { background-color: #fff !important; }
        
        .video-js .vjs-picture-in-picture-control { display: flex !important; }
        .video-js .vjs-subs-caps-button { display: flex !important; }
        
        /* HIDDEN BUTTONS */
        .video-js .vjs-live-control, .video-js .vjs-live-display, .video-js .vjs-remaining-time, .video-js .vjs-time-divider,
        .video-js .vjs-playback-rate, .video-js .vjs-audio-button, .video-js .vjs-chapters-button, .video-js .vjs-descriptions-button { 
            display: none !important; 
        }
        
        .video-js .vjs-progress-control { display: flex !important; flex: auto; align-items: center; margin: 0 10px; }
        .video-js .vjs-progress-holder { height: 6px; border-radius: 4px; background: rgba(255,255,255,0.2); }
        .video-js .vjs-play-progress { background-color: rgba(255,255,255,0.9); border-radius: 4px; }
        .video-js .vjs-play-progress:before { font-size: 14px; top: -4px; color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .video-js .vjs-load-progress { background: rgba(255,255,255,0.1) !important; border-radius: 4px; }
        .video-js .vjs-load-progress div { background: rgba(255,255,255,0.15) !important; border-radius: 4px; }

        /* --- CLOCK COMPONENT STYLING --- */
        .vjs-custom-clock {
            display: flex !important;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffaa; 
            background: rgba(0, 20, 10, 0.7); 
            border: 1px solid #005533; 
            border-radius: 20px;
            padding: 0 16px;
            margin: 0 8px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1.5px;
            white-space: nowrap;
            height: 36px;
            box-shadow: inset 0 0 8px rgba(0,255,170,0.1);
        }

        /* --- QUALITY COMPONENT STYLING (SETTINGS ICON) --- */
        .vjs-custom-quality-selector { display: flex !important; }

        .server-box {

            display: flex; gap: 12px; flex-direction: column; align-items: stretch;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);

            max-height: calc(100vh - 180px); overflow-y: auto; overflow-x: hidden; width: 130px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1; visibility: visible;
        }
        .server-box.hidden { transform: translateX(150%); opacity: 0; visibility: hidden; }
        
        .server-box::-webkit-scrollbar { width: 4px; }
        .server-box::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }

            opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        :fullscreen .server-box, :-webkit-full-screen .server-box, 
        :fullscreen .server-toggle-btn, :-webkit-full-screen .server-toggle-btn { display: none !important; }

        .server-btn{background:0 0;color:#ccc;padding:10px 8px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;border:none;position:relative;width:100%;text-align:center;}

        .badge-4k::after { content: '4K'; position: absolute; top: -6px; right: -4px; background: #FFD700; color: #000; font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 8px; box-shadow: 0 2px 5px rgba(255,215,0,0.5); }

        @media (max-width:768px){
            .video-js .vjs-control-bar, .fluid_controls_container {width:96%!important;bottom:15px!important;height:48px!important;padding:0 5px!important}
            .video-js .vjs-button{width:32px!important;height:32px!important;margin:0 2px!important}
            .video-js .vjs-icon-placeholder:before{font-size:1.4em!important;}
            .video-js .vjs-custom-quality-selector .vjs-icon-placeholder::before { background-size: 20px;}
            
            .vjs-custom-clock { font-size: 11px; padding: 0 8px; margin: 0 4px; height: 28px; letter-spacing: 0.5px; }

            .server-toggle-btn { top: 15px; right: 15px; width: 40px; height: 40px; }
            .server-box { top: 70px; right: 15px; width: 110px; padding: 15px 10px; max-height: calc(100vh - 140px); }
        }
    </style>
</head>

<script defer>
    let uiIdleTimer;
    function resetUIIdleTimer() {
        document.body.classList.remove('is-idle');
        clearTimeout(uiIdleTimer);
        uiIdleTimer = setTimeout(() => { document.body.classList.add('is-idle'); }, 3500); 
    }
    ['mousemove', 'mousedown', 'touchstart', 'click', 'keydown'].forEach(evt => {
        document.addEventListener(evt, resetUIIdleTimer, true);
    });
    resetUIIdleTimer(); 

    const nukePage=()=>{document.body.innerHTML='',document.body.style.backgroundColor='black',document.head.innerHTML=''};
    document.addEventListener('contextmenu',e=>e.preventDefault());
    document.addEventListener('keydown',e=>{if(123===e.keyCode||(e.ctrlKey&&e.shiftKey&&(73===e.keyCode||74===e.keyCode||67===e.keyCode))||(e.ctrlKey&&85===e.keyCode))e.preventDefault(),nukePage()});
    setInterval(()=>{const e=performance.now();debugger;performance.now()-e>100&&nukePage()},500);
    window.addEventListener('resize',()=>{const e=window.outerWidth-window.innerWidth,n=window.outerHeight-window.innerHeight;(e>160||n>160)&&nukePage()});
    const devtoolsDetector=new Image;Object.defineProperty(devtoolsDetector,'id',{get:function(){nukePage()}});console.log('%c',devtoolsDetector);

    function toggleServerList() {
        const serverBox = document.getElementById('serverBox');
        if (serverBox) serverBox.classList.toggle('hidden');
    }

    var hlsFluid = null;
    var fluidPlayerInstance = null;

    function initFluidPlayer(url) {
        if(!fluidPlayerInstance) {
            fluidPlayerInstance = fluidPlayer('fluid-player', {
                layoutControls: { fillToContainer: true, primaryColor: "#ffffff", autoPlay: true, mute: true, controlBar: { autoHide: true } }
            });
        }
        var videoEl = document.getElementById('fluid-player');
        if (Hls.isSupported()) {
            if(hlsFluid) hlsFluid.destroy();
            hlsFluid = new Hls({maxBufferLength: 30});
            hlsFluid.loadSource(url);
            hlsFluid.attachMedia(videoEl);
            hlsFluid.on(Hls.Events.MANIFEST_PARSED, function() { videoEl.play().catch(e=>console.log(e)); });
        } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
            videoEl.src = url;
            videoEl.play();
        }
    }

    window.addEventListener('load', function() {
        
        if(typeof videojs !== 'undefined') {
            const Component = videojs.getComponent('Component');
            const MenuButton = videojs.getComponent('MenuButton');
            const MenuItem = videojs.getComponent('MenuItem');

            class CustomClock extends Component {
                constructor(player, options) {
                    super(player, options);
                    this.updateTime();
                    setInterval(() => this.updateTime(), 1000);
                }
                updateTime() {
                    const now = new Date();
                    let hours = now.getHours();
                    let minutes = now.getMinutes();
                    let seconds = now.getSeconds();
                    const ampm = hours >= 12 ? 'PM' : 'AM';
                    hours = hours % 12;
                    hours = hours ? hours : 12; 
                    minutes = minutes < 10 ? '0' + minutes : minutes;
                    seconds = seconds < 10 ? '0' + seconds : seconds;
                    hours = hours < 10 ? '0' + hours : hours;
                    const timeString = `${hours}:${minutes}:${seconds} ${ampm}`;
                    this.el().innerText = timeString;
                }
                createEl() {
                    return videojs.dom.createEl('div', {
                        className: 'vjs-custom-clock'
                    });
                }
            }
            videojs.registerComponent('CustomClock', CustomClock);

            class QualityMenuItem extends MenuItem {
                constructor(player, options) {
                    super(player, options);
                    this.levels = options.levels;
                    this.level = options.level;
                }
                handleClick(event) {
                    super.handleClick(event);
                    for (let i = 0; i < this.levels.length; i++) {
                        this.levels[i].enabled = (this.level === 'auto' || this.levels[i].id === this.level.id);
                    }
                    this.trigger('qualitySelected', this.level);
                }
            }

            class CustomQualitySelector extends MenuButton {
                constructor(player, options) {
                    super(player, options);
                    this.controlText('Settings');

                    player.on('loadedmetadata', () => this.update());
                    const qualityLevels = player.qualityLevels();
                    qualityLevels.on('addqualitylevel', () => this.update());
                }

                createItems() {
                    const items = [];
                    const levels = this.player().qualityLevels();
                    
                    if (!levels || levels.length === 0) return items;

                    const seen = new Set();
                    for (let i = 0; i < levels.length; i++) {
                        const level = levels[i];
                        const label = level.height ? level.height + 'p' : Math.round(level.bitrate / 1000) + ' kbps';
                        if (!seen.has(label)) {
                            seen.add(label);
                            const item = new QualityMenuItem(this.player(), {
                                label: label,
                                levels: levels,
                                level: level,
                                selected: false
                            });
                            items.push(item);
                        }
                    }
                    
                    items.sort((a, b) => b.options_.level.height - a.options_.level.height);

                    const autoItem = new QualityMenuItem(this.player(), {
                        label: 'Auto',
                        levels: levels,
                        level: 'auto',
                        selected: true 
                    });
                    items.push(autoItem);

                    items.forEach(item => {
                        item.on('qualitySelected', () => {
                            items.forEach(i => i.selected(false));
                            item.selected(true);
                        });
                    });

                    return items;
                }

                buildCSSClass() {
                    return `vjs-custom-quality-selector ${super.buildCSSClass()}`;
                }
            }
            videojs.registerComponent('CustomQualitySelector', CustomQualitySelector);
        }
